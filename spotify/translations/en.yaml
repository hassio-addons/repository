---
configuration:
  log_level:
    name: Log level
    description: >-
      Controls the level of log details the app provides.
  name:
    name: Name
    description: >-
      The name of your device (the Spotify Connect target), as shown on
      the official Spotify clients.
  bitrate:
    name: Bitrate
    description: >-
      The bitrate Spotify should use. The higher, the better the sound quality,
      however, the app consumes more data.
  initial_volume:
    name: Initial Volume
    description: >-
      Initial volume in % from 0-100.
  autoplay:
    name: Autoplay
    description: >-
      Whether Spotify should autoplay similar songs at the end of the queue.
